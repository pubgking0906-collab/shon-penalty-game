<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main ball gradient - 3D effect -->
    <radialGradient id="ballBase" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f8f8f8"/>
      <stop offset="70%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </radialGradient>
    
    <!-- Panel gradient - dark with sheen -->
    <linearGradient id="panelDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    
    <!-- Gold accent gradient -->
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f4d03f"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    
    <!-- Maroon accent -->
    <linearGradient id="maroonAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b1c3f"/>
      <stop offset="50%" stop-color="#8b2252"/>
      <stop offset="100%" stop-color="#6b1c3f"/>
    </linearGradient>
    
    <!-- Edge shadow -->
    <radialGradient id="edgeShadow" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.25)"/>
    </radialGradient>
    
    <!-- Highlight shine -->
    <radialGradient id="shine" cx="35%" cy="25%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  
  <!-- Ball base -->
  <circle cx="50" cy="50" r="48" fill="url(#ballBase)"/>
  
  <!-- Modern flowing panels - Al Rihla style -->
  <!-- Top flowing panel -->
  <path d="M50,5 Q70,15 75,35 Q65,40 50,38 Q35,40 25,35 Q30,15 50,5" 
        fill="url(#panelDark)" opacity="0.95"/>
  
  <!-- Right flowing panel -->
  <path d="M78,40 Q92,50 85,70 Q75,75 60,68 Q55,55 65,42 Q72,38 78,40" 
        fill="url(#panelDark)" opacity="0.95"/>
  
  <!-- Left flowing panel -->
  <path d="M22,40 Q8,50 15,70 Q25,75 40,68 Q45,55 35,42 Q28,38 22,40" 
        fill="url(#panelDark)" opacity="0.95"/>
  
  <!-- Bottom panel -->
  <path d="M35,75 Q50,85 65,75 Q68,88 50,95 Q32,88 35,75" 
        fill="url(#panelDark)" opacity="0.95"/>
  
  <!-- Gold accent stripes -->
  <path d="M50,8 Q55,20 52,35" stroke="url(#goldAccent)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M80,45 Q72,55 62,65" stroke="url(#goldAccent)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M20,45 Q28,55 38,65" stroke="url(#goldAccent)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Maroon accent curves -->
  <path d="M35,12 Q25,25 25,38" stroke="url(#maroonAccent)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M65,12 Q75,25 75,38" stroke="url(#maroonAccent)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M45,78 Q50,85 55,78" stroke="url(#maroonAccent)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Seam lines -->
  <path d="M50,38 L50,5" stroke="rgba(100,100,100,0.3)" stroke-width="0.8" fill="none"/>
  <path d="M50,38 L25,35" stroke="rgba(100,100,100,0.3)" stroke-width="0.8" fill="none"/>
  <path d="M50,38 L75,35" stroke="rgba(100,100,100,0.3)" stroke-width="0.8" fill="none"/>
  <path d="M65,68 L85,70" stroke="rgba(100,100,100,0.3)" stroke-width="0.8" fill="none"/>
  <path d="M35,68 L15,70" stroke="rgba(100,100,100,0.3)" stroke-width="0.8" fill="none"/>
  
  <!-- Highlight reflection -->
  <ellipse cx="35" cy="28" rx="12" ry="8" fill="url(#shine)"/>
  
  <!-- Edge shadow -->
  <circle cx="50" cy="50" r="48" fill="url(#edgeShadow)"/>
  
  <!-- Subtle outline -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
</svg>
