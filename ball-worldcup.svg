<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main ball gradient - 3D effect -->
    <radialGradient id="ballBase" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f8f8f8"/>
      <stop offset="70%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </radialGradient>
    
    <!-- Edge shadow -->
    <radialGradient id="edgeShadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
    </radialGradient>
    
    <!-- Highlight shine -->
    <radialGradient id="shine" cx="35%" cy="25%" r="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  
  <!-- Ball base - smooth white -->
  <circle cx="50" cy="50" r="48" fill="url(#ballBase)"/>
  
  <!-- Highlight reflection -->
  <ellipse cx="35" cy="30" rx="15" ry="12" fill="url(#shine)"/>
  
  <!-- Edge shadow -->
  <circle cx="50" cy="50" r="48" fill="url(#edgeShadow)"/>
  
  <!-- Subtle outline -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
</svg>
